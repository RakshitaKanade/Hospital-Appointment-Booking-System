<!DOCTYPE html>
<html>
<head>
  <title>Hospital Appointment System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Hospital Appointment System</h1>

<h2>Add Patient</h2>
<input id="pname" placeholder="Name">
<input id="pemail" placeholder="Email">
<input id="pphone" placeholder="Phone">
<button onclick="addPatient()">Add</button>

<h2>Add Doctor</h2>
<input id="dname" placeholder="Name">
<input id="dspec" placeholder="Specialization">
<input id="demail" placeholder="Email">
<button onclick="addDoctor()">Add</button>

<h2>Book Appointment</h2>
<input id="patientId" placeholder="Patient ID">
<input id="doctorId" placeholder="Doctor ID">
<input id="date" type="date">
<button onclick="bookAppointment()">Book</button>

<h2>Appointments</h2>
<button onclick="getAppointments()">Load Appointments</button>

<ul id="appointmentsList"></ul>

<script src="script.js"></script>

</body>
</html>
