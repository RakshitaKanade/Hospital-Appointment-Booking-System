<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mediconnect — Appointment System</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Mediconnect</span>
    </div>
    <p class="tagline">Hospital Appointment System</p>
  </div>
</header>

<main class="container">

  <div class="tabs">
    <button class="tab active" onclick="showTab('patients')">👤 Patients</button>
    <button class="tab" onclick="showTab('doctors')">🩺 Doctors</button>
    <button class="tab" onclick="showTab('appointments')">📅 Appointments</button>
  </div>

  <!-- PATIENTS TAB -->
  <div id="tab-patients" class="tab-content active">
    <div class="split">
      <div class="card animate-in">
        <div class="card-header">
          <span class="card-icon">👤</span>
          <h2>Register Patient</h2>
        </div>
        <div class="form-group">
          <label>Full Name</label>
          <input id="pname" type="text" placeholder="e.g. Alice Johnson" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input id="pemail" type="email" placeholder="e.g. alice@email.com" />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input id="pphone" type="tel" placeholder="e.g. 9876543210" />
        </div>
        <button class="btn-primary" onclick="addPatient()">Register Patient</button>
        <div id="patient-msg" class="msg"></div>
      </div>
      <div class="card animate-in delay-1">
        <div class="card-header">
          <span class="card-icon">📋</span>
          <h2>All Patients</h2>
        </div>
        <button class="btn-secondary" onclick="loadPatientList()">Refresh List</button>
        <ul id="patientsList" class="data-list"></ul>
      </div>
    </div>
  </div>

  <!-- DOCTORS TAB -->
  <div id="tab-doctors" class="tab-content">
    <div class="split">
      <div class="card animate-in">
        <div class="card-header">
          <span class="card-icon">🩺</span>
          <h2>Add Doctor</h2>
        </div>
        <div class="form-group">
          <label>Doctor Name</label>
          <input id="dname" type="text" placeholder="e.g. Dr. John Smith" />
        </div>
        <div class="form-group">
          <label>Specialization</label>
          <input id="dspec" type="text" placeholder="e.g. Cardiology" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input id="demail" type="email" placeholder="e.g. john@hospital.com" />
        </div>
        <button class="btn-primary" onclick="addDoctor()">Add Doctor</button>
        <div id="doctor-msg" class="msg"></div>
      </div>
      <div class="card animate-in delay-1">
        <div class="card-header">
          <span class="card-icon">📋</span>
          <h2>All Doctors</h2>
        </div>
        <button class="btn-secondary" onclick="loadDoctorList()">Refresh List</button>
        <ul id="doctorsList" class="data-list"></ul>
      </div>
    </div>
  </div>

  <!-- APPOINTMENTS TAB -->
  <div id="tab-appointments" class="tab-content">
    <div class="split">
      <div class="card animate-in">
        <div class="card-header">
          <span class="card-icon">📅</span>
          <h2>Book Appointment</h2>
        </div>
        <div class="form-group">
          <label>Select Patient</label>
          <select id="patientId"></select>
        </div>
        <div class="form-group">
          <label>Select Doctor</label>
          <select id="doctorId"></select>
        </div>
        <div class="form-group">
          <label>Appointment Date</label>
          <input id="date" type="date" />
        </div>
        <button class="btn-primary" onclick="bookAppointment()">Book Appointment</button>
        <div id="appt-msg" class="msg"></div>
      </div>
      <div class="card animate-in delay-1">
        <div class="card-header">
          <span class="card-icon">🗂️</span>
          <h2>All Appointments</h2>
        </div>
        <button class="btn-secondary" onclick="getAppointments()">Refresh List</button>
        <ul id="appointmentsList" class="data-list"></ul>
      </div>
    </div>
  </div>

</main>

<footer>
  <p>Mediconnect © 2026 — Hospital Appointment System</p>
</footer>

<script src="script.js"></script>
</body>
</html>
